<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Cyberpunk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="scanlines"></div>
    <div class="vignette"></div>
    
    <div class="container">
        <header class="header">
            <div class="logo-container">
                <h1 class="logo" data-text="SNAKE">SNAKE</h1>
                <span class="mode-indicator" id="modeIndicator">CLÁSICO</span>
            </div>
            <div class="score-panel">
                <div class="score-item">
                    <span class="score-label">SCORE</span>
                    <span class="score-value" id="score">0</span>
                </div>
                <div class="score-item">
                    <span class="score-label">HIGH</span>
                    <span class="score-value" id="highScore">0</span>
                </div>
            </div>
            <button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema">
                <i class="bi bi-sun-fill"></i>
            </button>
        </header>

        <div class="game-container">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div class="overlay" id="overlay">
                <div class="overlay-content">
                    <h2 class="overlay-title" id="overlayTitle">SNAKE CYBERPUNK</h2>
                    <p class="overlay-text" id="overlayText">Presiona ENTER para jugar</p>
                    <p class="overlay-score" id="overlayScore"></p>
                    <div class="overlay-hint">Usa WASD o Flechas para moverte</div>
                </div>
            </div>
        </div>

        <div class="lives-panel" id="livesPanel">
            <span class="lives-label">VIDAS:</span>
            <div class="lives" id="lives"></div>
        </div>

        <div class="mobile-controls">
            <button class="action-btn" id="playPauseBtn">
                <i class="bi bi-play-fill" id="playPauseIcon"></i>
                <span id="playPauseText">JUGAR</span>
            </button>
        </div>

        <div class="mode-selector">
            <button class="mode-btn active" data-mode="classic" data-key="1">
                <span class="mode-key">1</span>
                <span class="mode-name">Clásico</span>
            </button>
            <button class="mode-btn" data-mode="challenge" data-key="2">
                <span class="mode-key">2</span>
                <span class="mode-name">Reto</span>
            </button>
            <button class="mode-btn" data-mode="endless" data-key="3">
                <span class="mode-key">3</span>
                <span class="mode-name">Infinito</span>
            </button>
        </div>

        <div class="virtual-keyboard" id="virtualKeyboard">
            <div class="d-pad">
                <button class="d-pad-btn" data-dir="up" aria-label="Arriba">
                    <i class="bi bi-chevron-up"></i>
                </button>
                <div class="d-pad-row">
                    <button class="d-pad-btn" data-dir="left" aria-label="Izquierda">
                        <i class="bi bi-chevron-left"></i>
                    </button>
                    <button class="d-pad-btn" data-dir="down" aria-label="Abajo">
                        <i class="bi bi-chevron-down"></i>
                    </button>
                    <button class="d-pad-btn" data-dir="right" aria-label="Derecha">
                        <i class="bi bi-chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>

        <footer class="footer">
            <div class="controls-info">
                <span><i class="bi bi-keyboard"></i> PC: WASD / Flechas</span>
                <span><i class="bi bi-pause-fill"></i> ESPACIO = Pausa</span>
            </div>
            <div class="credits">Snake Cyberpunk v1.0</div>
        </footer>
    </div>

    <script src="game.js"></script>
</body>
</html>
